<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0A14">
<title>Profil Saya — AeroRent</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../../css/global.css?v=3">
<link rel="stylesheet" href="../../css/customer.css?v=3">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<header id="navbar"></header>

<main class="container" style="padding-top: 120px; padding-bottom: 60px; min-height: 100vh; max-width: 680px;">
    <a href="javascript:history.back()" style="display:inline-flex; align-items:center; gap:6px; color:var(--color-text-faint); text-decoration:none; margin-bottom:16px; font-size:14px; font-weight:500;" class="hover-amber">
      <i class="ph-bold ph-arrow-left"></i> Kembali
    </a>
    <h1 class="font-display" style="font-size:clamp(1.8rem,4vw,2.6rem);">PROFIL <span class="text-purple">SAYA</span></h1>
    <p class="text-dim mt-2" style="font-size:14px;margin-bottom:24px;">Kelola informasi data diri akun Anda.</p>

    <div class="glass-card" style="padding:26px;">
      <div class="profil-header">
        <div style="position:relative; display:inline-block;">
          <div class="profil-avatar-lg" id="pf-avatar" style="overflow:hidden; padding:0;">?</div>
          <button type="button" class="btn-edit-avatar" onclick="showAvatarOptions()" style="position:absolute; bottom:-4px; right:-4px; background:var(--color-amber); border:none; border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; color:#111; cursor:pointer; box-shadow:0 2px 5px rgba(0,0,0,0.5);">
            <i class="ph-fill ph-camera"></i>
          </button>
        </div>
        <div>
          <div style="font-weight:700;font-size:16px;" id="pf-nama-display">—</div>
          <div class="text-dim" style="font-size:13px;" id="pf-email-display">—</div>
          <span class="badge badge-aktif mt-2" style="margin-top:6px;">Terverifikasi</span>
        </div>
      </div>

      <form id="form-profil">
        <div class="form-group">
          <label class="form-label" for="pf-nama">Nama Lengkap</label>
          <input type="text" id="pf-nama" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label" for="pf-email">Email (tidak dapat diubah)</label>
          <input type="email" id="pf-email" class="form-input" disabled style="opacity:.6;">
        </div>
        <div class="form-group">
          <label class="form-label" for="pf-nik">NIK / Nomor KTP (tidak dapat diubah)</label>
          <input type="text" id="pf-nik" class="form-input" disabled style="opacity:.6;">
        </div>
        <div class="form-group">
          <label class="form-label" for="pf-telp">Nomor Telepon / WhatsApp</label>
          <input type="tel" id="pf-telp" class="form-input" placeholder="0812xxxxxxxx">
        </div>
        <div class="form-group">
          <label class="form-label" for="pf-alamat">Alamat Domisili Lengkap</label>
          <textarea id="pf-alamat" class="form-textarea"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Dokumen Verifikasi (KTP / SIM)</label>
          <div class="doc-row">
            <span style="font-size:13px;"><i class="ph ph-identification-card"></i> KTP Nasional</span>
            <span class="badge badge-aktif">Terverifikasi</span>
          </div>
          <div class="doc-row">
            <span style="font-size:13px;"><i class="ph ph-car"></i> SIM A Aktif</span>
            <div style="display:flex; align-items:center; gap:8px;">
              <span id="badge-sim" class="badge badge-menunggu">Belum Diunggah</span>
              <button type="button" id="btn-upload-sim" class="btn btn-ghost" style="padding:4px 8px; font-size:11px;" onclick="document.getElementById('input-sim-profil').click()">
                Unggah
              </button>
            </div>
          </div>
        </div>

        <div style="display:flex; flex-direction:column; gap:14px; margin-top:24px;">
          <button type="submit" class="btn btn-primary" style="padding:12px 26px;"><i class="ph ph-floppy-disk"></i> Simpan Perubahan</button>
          <button type="button" class="btn btn-outline" style="padding:12px 26px; border-color:#ef4444; color:#ef4444;" onclick="logout('../../login.html')">
            <i class="ph ph-sign-out"></i> Keluar dari Akun
          </button>
        </div>
      </form>
    </div>
  </main>

<div id="toast-root"></div>

<!-- Modal Avatar Options -->
<div id="modal-avatar-options" class="modal-overlay hidden" style="z-index: 1000; display: none;">
  <div class="modal-content-box glass-card" style="max-width:320px; text-align:center;">
    <h3 style="margin-bottom:16px; font-size:18px;">Ubah Foto Profil</h3>
    <div style="display:flex; flex-direction:column; gap:12px;">
      <button class="btn btn-outline" onclick="document.getElementById('input-avatar-camera').click(); closeAvatarOptions();">
        <i class="ph ph-camera"></i> Ambil dari Kamera
      </button>
      <button class="btn btn-outline" onclick="document.getElementById('input-avatar-gallery').click(); closeAvatarOptions();">
        <i class="ph ph-image"></i> Pilih dari Galeri
      </button>
    </div>
    <button class="btn btn-ghost mt-4 btn-block" onclick="closeAvatarOptions()">Batal</button>
  </div>
</div>
<input type="file" id="input-avatar-camera" accept="image/*" capture="user" style="display:none;" onchange="handleAvatarUpload(event)">
<input type="file" id="input-avatar-gallery" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
<input type="file" id="input-sim-profil" accept="image/*" style="display:none;" onchange="handleSimUploadProfil(event)">

<script src="../../js/utils.js?v=3"></script>
<script src="../../js/api.js?v=3"></script>
<script src="../../js/components.js?v=3"></script>
<script src="../../js/customer.js?v=3"></script>
<script>document.addEventListener('DOMContentLoaded', initProfil);</script>
</body>
</html>
