<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0A14">
<title>Masuk / Daftar — AeroRent</title>
<meta name="description" content="Masuk atau daftar akun AeroRent untuk mulai menyewa kendaraan di Salatiga.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/global.css?v=3">
<link rel="stylesheet" href="css/auth.css?v=3">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<!-- Navbar (komponen bersama, di-render oleh js/components.js) -->
<header id="navbar"></header>

<main class="auth-page">
  <div class="auth-card glass-card">

    <div class="auth-logo-row">
      <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="lg-auth" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#F59E0B"/>
          </linearGradient>
        </defs>
        <polygon points="20,3 37,34 3,34" fill="url(#lg-auth)"/>
        <line x1="20" y1="3" x2="9" y2="24" stroke="white" stroke-width="1.5" opacity=".7"/>
        <line x1="20" y1="3" x2="14" y2="30" stroke="white" stroke-width="1" opacity=".4"/>
      </svg>
      <div class="auth-logo-text">AERO<span style="color:#7C3AED;">RENT</span></div>
    </div>

    <div class="auth-header">
      <h2 id="auth-title">MASUK AKUN</h2>
      <p id="auth-subtitle">Silakan masuk untuk menyewa armada AeroRent.</p>
    </div>

    <div class="tab-switcher">
      <button type="button" id="tab-login" class="tab-btn tab-active">Login</button>
      <button type="button" id="tab-register" class="tab-btn">Daftar</button>
    </div>

    <div id="auth-error" class="auth-error hidden" role="alert"></div>

    <!-- ===== FORM LOGIN ===== -->
    <form id="form-login" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="login-email">Alamat Email</label>
        <input type="email" id="login-email" class="form-input" required
              placeholder="customer@contoh.id">
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <div style="position:relative;">
          <input type="password" id="login-password" class="form-input" required
                placeholder="Minimal 8 karakter" style="padding-right:40px;">
          <button type="button" class="btn-toggle-password" onclick="togglePassword('login-password', this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim);"><i class="ph ph-eye"></i></button>
        </div>
      </div>
      <button type="submit" id="btn-login-submit" class="btn btn-primary btn-block" style="padding:14px;font-size:15px;margin-top:6px;">
        Masuk Sekarang
      </button>
    </form>

    <!-- ===== FORM DAFTAR ===== -->
    <form id="form-register" autocomplete="on" class="hidden">
      <!-- 1. KTP UPLOAD (PALING ATAS) -->
      <div class="form-group" style="margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">
        <label class="form-label" for="reg-ktp">Foto KTP (Format Gambar)</label>
        <p class="text-dim" style="font-size: 12px; margin-top: -6px; margin-bottom: 8px;">Upload KTP untuk mengisi Nama, NIK, dan Alamat otomatis.</p>
        <label class="file-input-wrap">
          <span id="reg-ktp-label">Silakan pilih foto KTP Anda...</span>
          <span class="browse-label">Browse</span>
          <input type="file" id="reg-ktp" accept="image/*">
        </label>
        <button type="button" id="btn-scan-reg-ktp" class="btn btn-ghost" style="width: 100%; margin-top: 8px; font-size: 13px;" onclick="scanRegKtp()">
          <i class="ph ph-scan"></i> Scan dari KTP
        </button>
        <div id="reg-ktp-status" class="hidden mt-2 text-sm text-center"></div>
      </div>

      <!-- 1.5. SIM A UPLOAD (OPSIONAL) -->
      <div class="form-group" style="margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);">
        <label class="form-label" for="reg-sim">Foto SIM A (Opsional)</label>
        <p class="text-dim" style="font-size: 12px; margin-top: -6px; margin-bottom: 8px;">Wajib diunggah jika Anda berencana menyewa mobil tanpa supir (lepas kunci).</p>
        <label class="file-input-wrap">
          <span id="reg-sim-label">Silakan pilih foto SIM A Anda...</span>
          <span class="browse-label">Browse</span>
          <input type="file" id="reg-sim" accept="image/*" onchange="document.getElementById('reg-sim-label').textContent = this.files[0]?.name || 'Silakan pilih foto SIM A Anda...'">
        </label>
      </div>

      <!-- 2. DATA DIRI -->
      <div class="form-group">
        <label class="form-label" for="reg-nik">NIK (Nomor Induk Kependudukan)</label>
        <input type="text" id="reg-nik" class="form-input" required placeholder="16 Digit NIK">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-nama">Nama Lengkap Sesuai KTP</label>
        <input type="text" id="reg-nama" class="form-input" required placeholder="Budi Santoso">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-alamat">Alamat Lengkap</label>
        <textarea id="reg-alamat" class="form-input" required placeholder="Sesuai KTP" style="min-height: 60px;"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-telp">Nomor Telepon / WhatsApp</label>
        <input type="tel" id="reg-telp" class="form-input" required placeholder="0812xxxxxxxx">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-email">Alamat Email</label>
        <input type="email" id="reg-email" class="form-input" required placeholder="customer@contoh.id">
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password">Password</label>
        <div style="position:relative;">
          <input type="password" id="reg-password" class="form-input" required placeholder="Minimal 8 karakter" style="padding-right:40px;">
          <button type="button" class="btn-toggle-password" onclick="togglePassword('reg-password', this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim);"><i class="ph ph-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="reg-password-confirm">Konfirmasi Password</label>
        <div style="position:relative;">
          <input type="password" id="reg-password-confirm" class="form-input" required placeholder="Ketik ulang password" style="padding-right:40px;">
          <button type="button" class="btn-toggle-password" onclick="togglePassword('reg-password-confirm', this)" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim);"><i class="ph ph-eye"></i></button>
        </div>
      </div>
      <button type="submit" id="btn-register-submit" class="btn btn-primary btn-block" style="padding:14px;font-size:15px;margin-top:6px;">
        Daftar Akun
      </button>
    </form>



  </div>
</main>

<div id="toast-root"></div>

<script src="js/utils.js?v=3"></script>
<script src="js/api.js?v=3"></script>
<script src="js/components.js?v=3"></script>
<script>
  window.AUTH_MODE = 'CUSTOMER';
  // Tampilkan navbar tanpa tombol "Masuk/Daftar" (karena kita sudah di halaman ini)
  document.addEventListener('DOMContentLoaded', () => renderNavbar('navbar', { rootPath: '', showAuthArea: false }));

  // Update label nama file saat foto KTP dipilih
  document.addEventListener('DOMContentLoaded', () => {
    qs('reg-ktp').addEventListener('change', (e) => {
      qs('reg-ktp-label').textContent = e.target.files[0]?.name || 'Silakan pilih foto KTP Anda...';
    });
  });

  // Fungsi toggle show/hide password
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.remove('ph-eye');
      icon.classList.add('ph-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.remove('ph-eye-slash');
      icon.classList.add('ph-eye');
    }
  }
</script>
<script src="js/auth.js?v=3"></script>
</body>
</html>
