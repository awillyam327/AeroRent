<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A14">
  <meta name="description" content="AeroRent Fleet & POS System — Login">
  <title>AeroRent — Login Sistem</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: {
          bebas: ['"Bebas Neue"', 'cursive'],
          dm:    ['"DM Sans"',    'sans-serif']
        },
        colors: { dark: '#0A0A14', darker: '#05050A' }
      }}
    }

    
  </script>

  <style>
    :root {
      --amber:    #F59E0B;
      --amber-d:  #D97706;
      --purple:   #7C3AED;
      --glass-bg: rgba(255,255,255,.03);
      --glass-bd: rgba(255,255,255,.08);
    }

    body {
      background: #0A0A14;
      font-family: 'DM Sans', sans-serif;
      color: white;
      overflow: hidden;
    }

    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-bd);
      backdrop-filter: blur(16px);
    }

    .g-input {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: white;
      outline: none;
      border-radius: 12px;
      transition: border-color .2s;
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
    }
    .g-input:focus { border-color: var(--amber); }
    .g-input::placeholder { color: rgba(255,255,255,.25); }

    .btn-submit {
      background: var(--amber);
      color: #0A0A14;
      font-weight: 700;
      border: none;
      cursor: pointer;
      border-radius: 12px;
      transition: background .2s, transform .1s;
      width: 100%;
      padding: 14px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-submit:hover:not(:disabled) { background: var(--amber-d); }
    .btn-submit:active:not(:disabled) { transform: scale(0.99); }
    .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; }

    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(130px);
      z-index: 0;
      pointer-events: none;
    }

    /* Toast notification */
    #toast {
      transition: opacity .3s ease, transform .3s ease;
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid rgba(10,10,20,.25);
      border-top-color: #0A0A14;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }
  </style>
</head>

<body class="flex items-center justify-center min-h-screen relative">

  <!-- Background glow decorations -->
  <div class="bg-glow" style="background:#7C3AED; top:-100px; left:-100px; opacity:.12;"></div>
  <div class="bg-glow" style="background:#F59E0B; bottom:-100px; right:-100px; opacity:.08;"></div>

  <!-- Main login card -->
  <div class="w-full max-w-md px-5 sm:px-0 relative z-10">

    <!-- Brand header -->
    <div class="flex flex-col items-center mb-8">
      <!-- Logo SVG -->
      <svg width="52" height="52" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" class="mb-4 drop-shadow-lg">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED"/>
            <stop offset="100%" stop-color="#F59E0B"/>
          </linearGradient>
        </defs>
        <polygon points="20,3 37,34 3,34" fill="url(#logoGrad)"/>
        <line x1="20" y1="3" x2="9"  y2="24" stroke="white" stroke-width="1.5" opacity=".7"/>
        <line x1="20" y1="3" x2="14" y2="30" stroke="white" stroke-width="1"   opacity=".4"/>
      </svg>

      <div class="font-bebas text-4xl tracking-widest leading-none">
        AERO<span style="color:#7C3AED;">RENT</span>
      </div>
      <div class="text-gray-500 text-xs mt-1.5 tracking-widest uppercase">
        Fleet &amp; POS System
      </div>
    </div>

    <!-- Login form card -->
    <form id="loginForm" class="glass rounded-3xl p-7 sm:p-8 shadow-2xl" onsubmit="handleLogin(event)" novalidate>

      <div class="mb-6">
        <h2 class="text-xl font-bold text-white">Selamat Datang</h2>
        <p class="text-sm text-gray-400 mt-1">Masuk dengan akun karyawan AeroRent Anda.</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="text-xs text-gray-500 uppercase tracking-widest block mb-2">
            Email Karyawan
          </label>
          <input
            type="email"
            id="email"
            required
            placeholder="owner@aerorent.id"
            class="g-input"
            autocomplete="email"
          >
        </div>

        <div>
          <label class="text-xs text-gray-500 uppercase tracking-widest block mb-2">
            Kata Sandi
          </label>
          <div class="relative">
            <input
              type="password"
              id="password"
              required
              placeholder="••••••••"
              class="g-input"
              autocomplete="current-password"
              style="padding-right: 48px;"
            >
            <!-- Toggle show/hide password -->
            <button type="button" id="togglePwd"
              onclick="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors p-1">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
                   stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <button type="submit" id="btnSubmit" class="btn-submit mt-7 flex items-center justify-center gap-2">
        <span id="btnText">Masuk ke Sistem</span>
      </button>

      <!-- Status koneksi API -->
      <div id="apiStatus" class="hidden mt-4 text-center text-xs text-gray-600">
        Menghubungkan ke <span id="apiHost" class="text-gray-500"></span>…
      </div>

    </form>

    <div class="text-center text-xs text-gray-600 mt-6">
      &copy; 2026 AeroRent Salatiga. All rights reserved.
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast"
       class="fixed top-5 right-5 z-50 glass rounded-2xl p-4 flex items-start gap-3 max-w-xs shadow-2xl"
       style="border-color: rgba(239,68,68,.3);">
    <span id="toastIcon" class="text-xl shrink-0">⚠️</span>
    <div>
      <div class="text-sm font-semibold text-red-200" id="toastTitle">Gagal Login</div>
      <div class="text-xs text-red-300/70 mt-0.5" id="toastMsg">—</div>
    </div>
    <button onclick="hideToast()" class="ml-auto text-gray-600 hover:text-white shrink-0 mt-0.5">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none"
           stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

<script>
  'use strict';

  // ============================================================
  // KONFIGURASI
  // ============================================================
  const API_BASE = 'https://pope-bolster-gallon.ngrok-free.dev';
  const AUTH_KEY = 'aerorent_auth';

  // Simpan URL Ngrok ke memori peramban agar bisa dibaca halaman lain
  localStorage.setItem('aerorent_api_base', API_BASE);

  // Header wajib untuk Ngrok agar tidak muncul peringatan browser
  const FETCH_HEADERS = {
    'Content-Type': 'application/x-www-form-urlencoded',
    'ngrok-skip-browser-warning': '69420',
  };

  // ============================================================
  // INISIALISASI: Jika sudah login, langsung redirect
  // ============================================================
  window.addEventListener('load', () => {
    // Register Service Worker untuk PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err =>
        console.warn('[SW] Registrasi gagal:', err)
      );
    }

    // Auto-redirect jika sesi masih valid
    const auth = parseLocalAuth();
    if (auth?.access_token && auth?.user?.role) {
      redirectByRole(auth.user.role);
    }

    // Tampilkan host API
    document.getElementById('apiHost').textContent = new URL(API_BASE).host;
  });

  // ============================================================
  // LOGIN HANDLER
  // ============================================================
  async function handleLogin(e) {
    e.preventDefault();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btnSubmit');
    const btnText  = document.getElementById('btnText');

    if (!email || !password) {
      showToast('⚠️', 'Validasi', 'Email dan kata sandi wajib diisi.');
      return;
    }

    // Loading state
    btn.disabled    = true;
    btnText.innerHTML = '<div class="spin"></div>';
    document.getElementById('apiStatus').classList.remove('hidden');

    try {
      const formData = new URLSearchParams();
      formData.append('username', email);
      formData.append('password', password);

      const res = await fetch(`${API_BASE}/auth/login`, {
        method:  'POST',
        headers: FETCH_HEADERS,
        body:    formData,
      });

      // Handle HTTP error codes
      if (res.status === 401) {
        throw new Error('Email atau kata sandi salah. Periksa kembali.');
      }
      if (res.status === 403) {
        throw new Error('Akun Anda telah dinonaktifkan. Hubungi Owner.');
      }
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.detail || `Server error (${res.status})`);
      }

      const data = await res.json();

      // ✅ DIPERBAIKI: Ambil role dari data.user.role (bukan data.role)
      // Struktur respons API: { access_token, refresh_token, token_type, user: {id, nama, email, role} }
      const userRole = data.user?.role || _decodeRoleFromJwt(data.access_token) || 'KASIR';

      // Simpan sesi ke localStorage dengan struktur lengkap
      localStorage.setItem(AUTH_KEY, JSON.stringify({
        access_token:  data.access_token,
        refresh_token: data.refresh_token || null,
        user: {
          id:    data.user?.id    || '',
          nama:  data.user?.nama  || email.split('@')[0],
          email: data.user?.email || email,
          role:  userRole,
        },
      }));

      // Redirect berdasarkan role
      redirectByRole(userRole);

    } catch (err) {
      const msg = err.message || 'Tidak dapat terhubung ke server.';

      // Bedakan error koneksi dari error kredensial
      if (err instanceof TypeError && err.message.includes('fetch')) {
        showToast('🔌', 'Koneksi Gagal',
          `Tidak bisa menjangkau ${new URL(API_BASE).host}. Pastikan server berjalan.`);
      } else {
        showToast('⚠️', 'Login Gagal', msg);
      }

      btn.disabled    = false;
      btnText.textContent = 'Masuk ke Sistem';
      document.getElementById('apiStatus').classList.add('hidden');
    }
  }

  // ============================================================
  // REDIRECT BERDASARKAN ROLE
  // ============================================================
  function redirectByRole(role) {
    if (role === 'OWNER') {
      window.location.replace('owner-dashboard.html');
    } else {
      // KASIR dan role lain → POS Terminal
      window.location.replace('pos-kasir.html');
    }
  }

  // ============================================================
  // HELPER: Decode role dari JWT payload (fallback)
  // ============================================================
  function _decodeRoleFromJwt(token) {
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      return payload.role || null;
    } catch {
      return null;
    }
  }

  // ============================================================
  // HELPER: Parse localStorage auth
  // ============================================================
  function parseLocalAuth() {
    try {
      return JSON.parse(localStorage.getItem(AUTH_KEY));
    } catch {
      return null;
    }
  }

  // ============================================================
  // UI HELPERS
  // ============================================================
  function togglePassword() {
    const input   = document.getElementById('password');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';

    // Ganti icon eye
    document.getElementById('eyeIcon').innerHTML = isHidden
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
         <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
         <line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
         <circle cx="12" cy="12" r="3"/>`;
  }

  let toastTimer;
  function showToast(icon, title, msg) {
    document.getElementById('toastIcon').textContent  = icon;
    document.getElementById('toastTitle').textContent = title;
    document.getElementById('toastMsg').textContent   = msg;
    document.getElementById('toast').classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, 4000);
  }

  function hideToast() {
    document.getElementById('toast').classList.remove('show');
  }
</script>
</body>
</html>
